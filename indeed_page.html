<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Software Engineer Jobs - Indeed</title>
  </head>
  <body>
    <main>
      <h1>Software Engineer Jobs</h1>
      
      <div id="jobsearch-ViewjobPaneWrapper">
        <div class="jobsearch-JobComponent">
          <div class="jobsearch-JobComponent-header">
            <h1 class="jobsearch-JobInfoHeader-title">Software Engineer</h1>
            <div class="jobsearch-InlineCompanyRating">
              <a class="jobsearch-InlineCompanyRating-companyLink" href="https://example.com">Tech Company</a>
            </div>
          </div>
          
          <div class="jobsearch-JobComponent-description">
            <p>We are looking for a Software Engineer to join our team.</p>
          </div>
          
          <div class="jobsearch-JobComponent-footer">
            <button class="icl-Button icl-Button--primary" id="applyButton">Apply Now</button>
          </div>
        </div>
      </div>
      
      <div id="jobsearch-SerpJobCardContainer">
        <article class="jobsearch-SerpJobCard" data-jk="abc123">
          <h2 class="title">
            <a class="jcs-JobTitle" href="/viewjob?jk=abc123">Senior Software Engineer</a>
          </h2>
          <span class="companyName">Example Corp</span>
          <div class="companyLocation">San Francisco, CA</div>
        </article>
        
        <article class="jobsearch-SerpJobCard" data-jk="def456">
          <h2 class="title">
            <a class="jcs-JobTitle" href="/viewjob?jk=def456">Frontend Developer</a>
          </h2>
          <span class="companyName">Startup Inc</span>
          <div class="companyLocation">Remote</div>
        </article>
        
        <article class="jobsearch-SerpJobCard" data-jk="ghi789">
          <h2 class="title">
            <a class="jcs-JobTitle" href="/viewjob?jk=ghi789">Backend Engineer</a>
          </h2>
          <span class="companyName">Tech Solutions</span>
          <div class="companyLocation">New York, NY</div>
        </article>
      </div>
    </main>
  </body>
</html>
